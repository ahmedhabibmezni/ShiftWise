name: ci

# Runs the frontend and backend test suites on every push to develop/main
# and on every pull request. Path filters scope each job to its side of
# the repo so a frontend-only PR doesn't pay for backend setup, and
# vice-versa.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-flight runs when a new commit lands on the same ref — saves
# minutes on rapid pushes during active development.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: frontend · typecheck + vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit --pretty false

      - name: Vitest
        run: npx vitest run

  backend:
    name: backend · pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # SECRET_KEY has a dev fallback in config.py — CI doesn't need a real
    # one. Pinned to make the intent explicit and avoid a future "why is
    # SECRET_KEY undefined" debugging session.
    env:
      SECRET_KEY: ci-test-secret-32-characters-long
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: pytest (CI-safe suites only)
        # Excluded suites need live infra and have no CI value here:
        #   - test_complete_api.py        → requires a running server
        #   - test_user_management.py     → requires a running server
        #   - test_analyzer_live.py       → calls the trained model on disk
        #   - test_hyperv_discovery.py    → requires Hyper-V on Windows
        #   - test_*_sync.py              → require real hypervisor sources
        #   - test_kubevirt_client.py     → has manual-only fixtures
        # The remaining set covers /health, analyzer, adapter, converter,
        # celery, migrator, and migrator-p1 — pure unit tests with mocks.
        run: |
          python -m pytest \
            tests/test_health.py \
            tests/test_analyzer.py \
            tests/test_adapter.py \
            tests/test_celery_tasks.py \
            tests/test_converter.py \
            tests/test_migrator.py \
            tests/test_migrator_p1.py \
            --tb=short -v
