name: release

# Trigger on semantic-version tags (e.g. v1.0.0, v1.0.0-rc1). This workflow
# MINTS immutable, human-named `vX.Y.Z` images for archival and rollback
# targets — it does NOT deploy. Continuous deployment is push-based and owned
# by cd.yml (push develop → staging, push main → production). A tag here gives
# you a stable, semantically-versioned image you can later pin an overlay to by
# hand for a deliberate, named release; the everyday deploy path is a branch
# push. All quality gates run before the build so a tag never points at a
# red build.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# ----------------------------------------------------------------------------
# Action pinning (G4) — supply-chain hardening. Mirror of the ci.yml policy.
#
# Every third-party action below is pinned to a full 40-char commit SHA, with
# a trailing `# vX.Y.Z` comment for human readability. Tags can be force-moved
# by the maintainer; a commit SHA is immutable. Resolve a new SHA with:
#
#   gh api repos/<owner>/<action>/git/refs/tags/<tag> --jq '.object.sha,.object.type'
#
# Verified SHAs (sourced from ci.yml + release-only actions, resolved 2026-05-22):
#   actions/checkout@v4.2.2                       11bd71901bbe5b1630ceea73d27597364c9af683
#   actions/setup-node@v4.1.0                     39370e3970a6d050c480ffad4ff0ed4d3fdee5af
#   actions/setup-python@v5.3.0                   0b93645e9fea7318ecaed2b359559ac225c90a2b
#   docker/login-action@v3.3.0                    9780b0c442fbb1117ed29e0efdff1e18412f7567
#   docker/setup-buildx-action@v3.7.1             c47758b77c9736f4b2ef4073d4d51994fabfe349
#   redhat-actions/openshift-tools-installer@v1   144527c7d98999f2652264c048c7a9bd103f8a82
# ----------------------------------------------------------------------------

jobs:
  quality-gates:
    name: quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: setup python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"
          cache: pip

      - name: install backend deps
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: ruff
        working-directory: backend
        run: ruff check app/ tests/

      - name: pytest with coverage gate
        working-directory: backend
        env:
          # Generate an ephemeral Fernet key for the test session so
          # Settings() boots cleanly. conftest.py also does this, but
          # we set it at the workflow level for defence-in-depth.
          SHIFTWISE_FERNET_KEY: ${{ secrets.CI_FERNET_KEY }}
        run: pytest tests/ -v --tb=short --cov=app --cov-fail-under=80

      - name: setup node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: install frontend deps
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      # `tsc -b` (not `tsc --noEmit`): the root tsconfig.json is solution-style
      # (`files: []` + project references), so `tsc --noEmit` resolves no input
      # files and silently passes. `-b` builds the referenced projects and is
      # the only invocation that actually type-checks the SPA. Mirrors ci.yml.
      - name: frontend typecheck
        working-directory: frontend
        run: npx tsc -b --pretty false

      - name: frontend lint
        working-directory: frontend
        run: npm run lint

      - name: frontend vitest
        working-directory: frontend
        run: npm test

      - name: frontend vite build
        working-directory: frontend
        run: npm run build

  build-push:
    name: build, tag and push images
    runs-on: ubuntu-latest
    needs: quality-gates
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          # Buildx + docker push only need the working tree contents,
          # not authenticated git ops — drop the token from .git/config.
          persist-credentials: false

      - name: docker login
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # v3.3.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: set up buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349  # v3.7.1

      - name: build & push backend with bounded retry
        # Three attempts with exponential backoff (30s / 2min / 8min)
        # absorbs registry hiccups; the run fails cleanly on retry
        # exhaustion (US5 R7, FR-012). Exit code is captured explicitly
        # so retry classification stays independent of bash ``until``
        # semantics under ``pipefail``.
        run: |
          set -uo pipefail
          attempt=1
          delay=30
          while true; do
            set +e
            docker buildx build \
                --platform linux/amd64 \
                --push \
                --tag docker.io/dida1609/shiftwise-backend:${{ github.ref_name }} \
                --tag docker.io/dida1609/shiftwise-backend:sha-${{ github.sha }} \
                --file backend/Dockerfile \
                backend
            rc=$?
            set -e
            if [ "$rc" -eq 0 ]; then
              echo "::notice::backend push succeeded on attempt $attempt"
              break
            fi
            if [ "$attempt" -ge 3 ]; then
              echo "::error::backend image push failed after $attempt attempts (last exit=$rc)"
              exit 1
            fi
            echo "::warning::backend push attempt $attempt failed (exit=$rc); sleeping ${delay}s"
            sleep "$delay"
            attempt=$((attempt + 1))
            delay=$((delay * 4))
          done

      - name: build & push frontend with bounded retry
        run: |
          set -uo pipefail
          attempt=1
          delay=30
          while true; do
            set +e
            docker buildx build \
                --platform linux/amd64 \
                --push \
                --tag docker.io/dida1609/shiftwise-frontend:${{ github.ref_name }} \
                --tag docker.io/dida1609/shiftwise-frontend:sha-${{ github.sha }} \
                --file frontend/Dockerfile \
                frontend
            rc=$?
            set -e
            if [ "$rc" -eq 0 ]; then
              echo "::notice::frontend push succeeded on attempt $attempt"
              break
            fi
            if [ "$attempt" -ge 3 ]; then
              echo "::error::frontend image push failed after $attempt attempts (last exit=$rc)"
              exit 1
            fi
            echo "::warning::frontend push attempt $attempt failed (exit=$rc); sleeping ${delay}s"
            sleep "$delay"
            attempt=$((attempt + 1))
            delay=$((delay * 4))
          done

  summary:
    name: release summary
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - name: summary
        run: |
          {
            echo "## Released ${{ github.ref_name }}"
            echo ""
            echo "Immutable images pushed:"
            echo "- \`docker.io/dida1609/shiftwise-backend:${{ github.ref_name }}\` (+ \`sha-${{ github.sha }}\`)"
            echo "- \`docker.io/dida1609/shiftwise-frontend:${{ github.ref_name }}\` (+ \`sha-${{ github.sha }}\`)"
            echo ""
            echo "This workflow does NOT deploy. Continuous deployment is push-based (cd.yml):"
            echo "push develop → staging, push main → production."
            echo "To pin a named release by hand, bump the overlay image tag to \`${{ github.ref_name }}\`"
            echo "via PR to the target branch (see backend/openshift/CICD-RUNBOOK.md)."
          } >> "$GITHUB_STEP_SUMMARY"
