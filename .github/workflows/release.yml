name: release

# Trigger on semantic-version tags pushed to the default branch
# (e.g. v1.0.0, v1.0.0-rc1). All quality gates run before the build /
# push / deploy phase; any failure stops the workflow before a tag
# becomes visible in the registry.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# ----------------------------------------------------------------------------
# Action pinning (G4) — supply-chain hardening. Mirror of the ci.yml policy.
#
# Every third-party action below is pinned to a full 40-char commit SHA, with
# a trailing `# vX.Y.Z` comment for human readability. Tags can be force-moved
# by the maintainer; a commit SHA is immutable. Resolve a new SHA with:
#
#   gh api repos/<owner>/<action>/git/refs/tags/<tag> --jq '.object.sha,.object.type'
#
# Verified SHAs (sourced from ci.yml + release-only actions, resolved 2026-05-22):
#   actions/checkout@v4.2.2                       11bd71901bbe5b1630ceea73d27597364c9af683
#   actions/setup-node@v4.1.0                     39370e3970a6d050c480ffad4ff0ed4d3fdee5af
#   actions/setup-python@v5.3.0                   0b93645e9fea7318ecaed2b359559ac225c90a2b
#   docker/login-action@v3.3.0                    9780b0c442fbb1117ed29e0efdff1e18412f7567
#   docker/setup-buildx-action@v3.7.1             c47758b77c9736f4b2ef4073d4d51994fabfe349
#   redhat-actions/openshift-tools-installer@v1   144527c7d98999f2652264c048c7a9bd103f8a82
# ----------------------------------------------------------------------------

jobs:
  quality-gates:
    name: quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: setup python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"
          cache: pip

      - name: install backend deps
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: ruff
        working-directory: backend
        run: ruff check app/ tests/

      - name: pytest with coverage gate
        working-directory: backend
        env:
          # Generate an ephemeral Fernet key for the test session so
          # Settings() boots cleanly. conftest.py also does this, but
          # we set it at the workflow level for defence-in-depth.
          SHIFTWISE_FERNET_KEY: ${{ secrets.CI_FERNET_KEY }}
        run: pytest tests/ -v --tb=short --cov=app --cov-fail-under=80

      - name: setup node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: install frontend deps
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: frontend typecheck
        working-directory: frontend
        run: npx tsc --noEmit

      - name: frontend lint
        working-directory: frontend
        run: npm run lint

      - name: frontend vitest
        working-directory: frontend
        run: npm test

      - name: frontend vite build
        working-directory: frontend
        run: npm run build

  build-push:
    name: build, tag and push images
    runs-on: ubuntu-latest
    needs: quality-gates
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          # Buildx + docker push only need the working tree contents,
          # not authenticated git ops — drop the token from .git/config.
          persist-credentials: false

      - name: docker login
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # v3.3.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: set up buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349  # v3.7.1

      - name: build & push backend with bounded retry
        # Three attempts with exponential backoff (30s / 2min / 8min)
        # absorbs registry hiccups; the run fails cleanly on retry
        # exhaustion (US5 R7, FR-012). Exit code is captured explicitly
        # so retry classification stays independent of bash ``until``
        # semantics under ``pipefail``.
        run: |
          set -uo pipefail
          attempt=1
          delay=30
          while true; do
            set +e
            docker buildx build \
                --platform linux/amd64 \
                --push \
                --tag docker.io/dida1609/shiftwise-backend:${{ github.ref_name }} \
                --tag docker.io/dida1609/shiftwise-backend:sha-${{ github.sha }} \
                --file backend/Dockerfile \
                backend
            rc=$?
            set -e
            if [ "$rc" -eq 0 ]; then
              echo "::notice::backend push succeeded on attempt $attempt"
              break
            fi
            if [ "$attempt" -ge 3 ]; then
              echo "::error::backend image push failed after $attempt attempts (last exit=$rc)"
              exit 1
            fi
            echo "::warning::backend push attempt $attempt failed (exit=$rc); sleeping ${delay}s"
            sleep "$delay"
            attempt=$((attempt + 1))
            delay=$((delay * 4))
          done

      - name: build & push frontend with bounded retry
        run: |
          set -uo pipefail
          attempt=1
          delay=30
          while true; do
            set +e
            docker buildx build \
                --platform linux/amd64 \
                --push \
                --tag docker.io/dida1609/shiftwise-frontend:${{ github.ref_name }} \
                --tag docker.io/dida1609/shiftwise-frontend:sha-${{ github.sha }} \
                --file frontend/Dockerfile \
                frontend
            rc=$?
            set -e
            if [ "$rc" -eq 0 ]; then
              echo "::notice::frontend push succeeded on attempt $attempt"
              break
            fi
            if [ "$attempt" -ge 3 ]; then
              echo "::error::frontend image push failed after $attempt attempts (last exit=$rc)"
              exit 1
            fi
            echo "::warning::frontend push attempt $attempt failed (exit=$rc); sleeping ${delay}s"
            sleep "$delay"
            attempt=$((attempt + 1))
            delay=$((delay * 4))
          done

  bump-staging-image:
    name: bump staging image tag (GitOps)
    runs-on: ubuntu-latest
    needs: build-push
    # The cluster API is private (on-prem, behind a VPN) and unreachable from a
    # GitHub-hosted runner — so we do NOT `oc apply` here. Instead we bump the
    # staging overlay's image tag in git and let the in-cluster Argo CD
    # Application (backend/openshift/argocd/application-staging.yaml) reconcile
    # it. Pull-based: no cluster credentials in CI, no inbound to the cluster.
    permissions:
      contents: write              # this job pushes the tag-bump commit
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          # Need the token in .git/config to push the bump commit, and the
          # full history of `develop` (not the detached tag) to commit onto it.
          persist-credentials: true
          fetch-depth: 0
          ref: develop

      - name: install kustomize
        # Version-pinned binary. An operator may add a sha256 check against the
        # published checksums file for full supply-chain parity with the SHA
        # action pins above.
        run: |
          set -euo pipefail
          VERSION=v5.4.3
          curl -sSL -o kustomize.tar.gz \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${VERSION}/kustomize_${VERSION}_linux_amd64.tar.gz"
          tar xzf kustomize.tar.gz
          sudo mv kustomize /usr/local/bin/kustomize
          kustomize version

      - name: bump staging overlay image tags
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          cd backend/openshift/overlays/staging
          kustomize edit set image \
            "docker.io/dida1609/shiftwise-backend:${TAG}" \
            "docker.io/dida1609/shiftwise-frontend:${TAG}"
          cd - >/dev/null
          git --no-pager diff -- backend/openshift/overlays/staging/kustomization.yaml

      - name: commit and push to develop
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if git diff --quiet -- backend/openshift/overlays/staging/kustomization.yaml; then
            echo "::notice::staging overlay already at ${TAG}; nothing to commit"
            exit 0
          fi
          git config user.name  "shiftwise-ci"
          git config user.email "ci@nextstep-it.com"
          git add backend/openshift/overlays/staging/kustomization.yaml
          git commit -m "chore(deploy): staging image tag ${TAG}"
          # If `develop` is a protected branch requiring PRs, this push is
          # rejected — switch to a PR-based bump in that case (see argocd/README.md).
          git push origin develop

      - name: summary
        run: |
          {
            echo "## Released ${{ github.ref_name }}"
            echo "Images pushed: shiftwise-backend:${{ github.ref_name }}, shiftwise-frontend:${{ github.ref_name }}"
            echo "Staging: overlay tag bumped on develop → Argo CD auto-syncs shiftwise-staging."
            echo "Production: manual — PR the tag into overlays/production on main, then sync shiftwise-production."
          } >> "$GITHUB_STEP_SUMMARY"
