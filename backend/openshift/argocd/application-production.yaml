# Argo CD Application — ShiftWise PRODUCTION (pull-based GitOps, AUTO sync).
#
# Continuous deployment: a push to `main` runs CI, then cd.yml builds/scans the
# images, bumps overlays/production, and commits to `main`. Argo auto-syncs the
# commit to the `shiftwise` namespace. This is full CD by deliberate choice —
# the previous manual-promotion gate (constitution Governance §4) has been
# traded for speed; promotion is now governed by what lands on `main` (i.e. by
# the PR review + branch protection on `main`, NOT by a separate Argo click).
#
# `selfHeal` is intentionally LEFT OFF on production: Argo still auto-syncs new
# git revisions, but it will NOT revert live drift, so an operator doing
# emergency `oc` surgery during an incident is not fought by the controller.
# Staging keeps selfHeal on (cheap to lose, want it pristine).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shiftwise-production
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/ahmedhabibmezni/ShiftWise.git
    targetRevision: main
    path: backend/openshift/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: shiftwise
  syncPolicy:
    automated:
      prune: true                      # delete resources removed from git
      selfHeal: false                  # do NOT fight emergency oc surgery on prod
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 8m
  # The HorizontalPodAutoscaler owns `.spec.replicas` at runtime. Without this,
  # Argo sees the HPA-scaled replica count as drift from the manifest's static
  # value and (on selfHeal) would scale it back — fighting the autoscaler.
  # Ignoring the field lets the HPA win while everything else stays GitOps-managed.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    # The migrator's `ensure_populator_scc` appends a per-tenant populator SA
    # (`system:serviceaccount:shiftwise-<tenant>:shiftwise-populator`) to the
    # SCC `users` list at runtime, on every migration into a fresh tenant
    # namespace. That is by design — git can never enumerate the live tenants —
    # so the SCC `users`/`groups` will always carry entries git does not know
    # about. Ignore them so this runtime mutation does not show as perpetual
    # drift (and, on a selfHeal App, is not reverted out from under a running
    # migration).
    - group: security.openshift.io
      kind: SecurityContextConstraints
      name: shiftwise-populator
      jsonPointers:
        - /users
        - /groups
