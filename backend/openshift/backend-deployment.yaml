# Backend FastAPI — sert l'API REST sur 8000.
#
# 2 répliques pour HA. Pas d'état local : tout passe par PostgreSQL et Redis.
# Exposé via Route TLS edge.
#
# Le ServiceAccount est différent du worker : l'API ne crée pas de Jobs K8s
# elle-même (c'est le worker qui le fait). Elle a juste besoin de lire les
# VMs/Migrations dans `shiftwise-converter` pour le statut.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: shiftwise-api
  namespace: shiftwise
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: api-reader
  namespace: shiftwise-converter
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: api-can-read-jobs
  namespace: shiftwise-converter
subjects:
  - kind: ServiceAccount
    name: shiftwise-api
    namespace: shiftwise
roleRef:
  kind: Role
  name: api-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: shiftwise
  labels: {app: backend, component: api}
spec:
  replicas: 2
  selector:
    matchLabels: {app: backend}
  template:
    metadata:
      labels: {app: backend, component: api}
    spec:
      serviceAccountName: shiftwise-api
      containers:
        - name: api
          image: docker.io/dida1609/shiftwise-backend:latest
          imagePullPolicy: IfNotPresent
          command:
            - uvicorn
            - app.main:app
            - --host=0.0.0.0
            - --port=8000
            - --workers=2
          envFrom:
            - secretRef:    {name: shiftwise-secrets}
            - configMapRef: {name: shiftwise-config}
          env:
            - {name: DATABASE_HOST,         value: postgresql}
            - {name: CELERY_BROKER_URL,     value: "redis://redis:6379/0"}
            - {name: CELERY_RESULT_BACKEND, value: "redis://redis:6379/0"}
          ports:
            - {name: http, containerPort: 8000}
          resources:
            requests: {cpu: 200m, memory: 384Mi}
            limits:   {cpu: 1000m, memory: 768Mi}
          livenessProbe:
            httpGet: {path: /health, port: 8000}
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet: {path: /health, port: 8000}
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: shiftwise
spec:
  selector: {app: backend}
  ports:
    - {name: http, port: 8000, targetPort: 8000}
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: backend
  namespace: shiftwise
spec:
  to: {kind: Service, name: backend}
  port: {targetPort: http}
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
