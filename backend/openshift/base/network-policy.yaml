# NetworkPolicy — segmentation réseau du namespace `shiftwise` (G17).
#
# Modèle : default-deny en INGRESS, puis on ré-autorise explicitement les
# seuls flux légitimes. L'EGRESS n'est volontairement pas restreint ici —
# les workers doivent joindre des hyperviseurs externes, le serveur NFS, et
# l'API Kubernetes, dont les plages ne sont pas stables ; un default-deny
# egress demanderait une cartographie réseau séparée (à traiter plus tard).
#
# Conséquence du default-deny ingress :
#   - PostgreSQL n'accepte du trafic que des pods backend / worker / db-init.
#   - Redis n'accepte du trafic que des pods backend / worker / flower.
#   - Le backend n'accepte du trafic HTTP que du routeur OpenShift.
#   - Flower n'a aucune règle d'ingress entrante : il n'est joignable que
#     via `oc port-forward` (qui passe par l'API server, hors NetworkPolicy).
#
# Les sondes liveness/readiness du kubelet ne sont PAS affectées : le kubelet
# sonde depuis le nœud, ce qui contourne les NetworkPolicy.
#
# Sélecteurs de pods utilisés (labels portés par chaque workload) :
#   backend → app=backend   celery-worker → app=celery-worker
#   flower  → app=flower     db-init → app=db-init
#   postgresql → app=postgresql   redis → app=redis
---
# 1. Default-deny : aucun ingress vers aucun pod du namespace, sauf
#    réautorisation explicite par les policies ci-dessous (elles sont additives).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: shiftwise
  labels:
    app.kubernetes.io/managed-by: shiftwise
spec:
  podSelector: {}            # tous les pods du namespace
  policyTypes:
    - Ingress
  # Pas de bloc `ingress:` → tout trafic entrant est refusé.
---
# 2. PostgreSQL :5432 — accepte uniquement backend / worker / db-init.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgresql-ingress
  namespace: shiftwise
  labels:
    app.kubernetes.io/managed-by: shiftwise
spec:
  podSelector:
    matchLabels: {app: postgresql}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels: {app: backend}
        - podSelector:
            matchLabels: {app: celery-worker}
        - podSelector:
            matchLabels: {app: db-init}
      ports:
        - {protocol: TCP, port: 5432}
---
# 3. Redis :6379 — accepte uniquement backend / worker / flower.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-ingress
  namespace: shiftwise
  labels:
    app.kubernetes.io/managed-by: shiftwise
spec:
  podSelector:
    matchLabels: {app: redis}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels: {app: backend}
        - podSelector:
            matchLabels: {app: celery-worker}
        - podSelector:
            matchLabels: {app: flower}
      ports:
        - {protocol: TCP, port: 6379}
---
# 4. Backend :8000 — accepte le trafic HTTP du routeur OpenShift (la Route
#    `backend` est TLS edge). Sur ce cluster bare-metal UPI le routeur tourne en
#    `endpointPublishingStrategy: HostNetwork` : son trafic vers les pods sort
#    du réseau de l'hôte, PAS du réseau de pods d'`openshift-ingress`. Un
#    namespaceSelector sur `openshift-ingress` seul ne matche donc pas (→ 503).
#    On autorise EN PLUS le groupe `host-network` d'OVNKubernetes (namespace
#    `openshift-host-network`, label `policy-group.network.openshift.io/host-network`)
#    qui couvre précisément le trafic source-hôte du routeur.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-from-router
  namespace: shiftwise
  labels:
    app.kubernetes.io/managed-by: shiftwise
spec:
  podSelector:
    matchLabels: {app: backend}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-ingress
        - namespaceSelector:
            matchLabels:
              policy-group.network.openshift.io/host-network: ""
      ports:
        - {protocol: TCP, port: 8000}
---
# 5. Frontend :8080 — accepte le trafic HTTP du routeur OpenShift (Route
#    `frontend` TLS edge, host partagé avec le backend). Sans cette règle, le
#    default-deny ci-dessus rendrait la SPA injoignable (503 côté routeur).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-from-router
  namespace: shiftwise
  labels:
    app.kubernetes.io/managed-by: shiftwise
spec:
  podSelector:
    matchLabels: {app: frontend}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-ingress
        # HostNetwork router (bare-metal UPI) — voir la note du backend ci-dessus.
        - namespaceSelector:
            matchLabels:
              policy-group.network.openshift.io/host-network: ""
      ports:
        - {protocol: TCP, port: 8080}
