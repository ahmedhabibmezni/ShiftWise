# Flower — Celery monitoring UI. Read-only view of queues, workers, tasks.
# Exposed via OpenShift Route (TLS edge-terminated).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flower
  namespace: shiftwise
  labels: {app: flower, component: monitoring}
spec:
  replicas: 1
  selector:
    matchLabels: {app: flower}
  template:
    metadata:
      labels: {app: flower, component: monitoring}
    spec:
      # Désactive les vars d'env auto FLOWER_* injectées par le Service "flower"
      # (FLOWER_PORT=tcp://x.x.x.x:5555 collide avec l'option --port de Flower).
      enableServiceLinks: false
      containers:
        - name: flower
          image: docker.io/dida1609/shiftwise-backend:latest
          command:
            - celery
            - -A
            - app.core.celery_app
            - flower
            - --port=5555
            - --address=0.0.0.0
          # envFrom requis : app.core.config.Settings() exige DATABASE_*/SECRET_KEY
          # à l'import de app.core.celery_app, même si Flower ne les utilise pas.
          envFrom:
            - secretRef:    {name: shiftwise-secrets}
            - configMapRef: {name: shiftwise-config}
          env:
            - {name: DATABASE_HOST,         value: postgresql}
            - {name: CELERY_BROKER_URL,     value: "redis://redis:6379/0"}
            - {name: CELERY_RESULT_BACKEND, value: "redis://redis:6379/0"}
          ports:
            - {name: http, containerPort: 5555}
          resources:
            requests: {cpu: 50m,  memory: 128Mi}
            limits:   {cpu: 200m, memory: 256Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: flower
  namespace: shiftwise
spec:
  selector: {app: flower}
  ports:
    - {name: http, port: 5555, targetPort: 5555}
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: flower
  namespace: shiftwise
spec:
  to: {kind: Service, name: flower}
  port: {targetPort: http}
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
