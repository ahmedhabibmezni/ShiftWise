# Ordre d'application — kustomize respecte l'ordre déclaré.
#
#   oc apply -k openshift/
#
# Ne contient PAS db-init-job.yaml : ce Job doit tourner UNE seule fois et
# être appliqué manuellement après le déploiement de PostgreSQL.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: shiftwise
resources:
  - postgresql-deployment.yaml
  - redis-deployment.yaml
  - worker-rbac.yaml
  - backend-deployment.yaml
  - celery-worker-deployment.yaml
  - flower-deployment.yaml
