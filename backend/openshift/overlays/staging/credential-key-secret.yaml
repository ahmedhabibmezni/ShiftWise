# shiftwise-credential-key — Fernet vault key for hypervisor credentials
# ----------------------------------------------------------------------
# DO NOT commit a real key value here. This file is a placeholder /
# template only.  The operator creates the Secret out-of-band on each
# environment with:
#
#   FERNET_KEY=$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
#   oc -n shiftwise-staging create secret generic shiftwise-credential-key \
#     --from-literal=SHIFTWISE_FERNET_KEY="$FERNET_KEY"
#
# To rotate, append the old key to SHIFTWISE_FERNET_OLD_KEYS (comma
# separated), regenerate the primary, restart the backend + workers,
# rewrite all ciphertexts via the rotation Alembic data migration, then
# remove the old key from the env.
#
# Constitution Principle II (security by default): the key MUST live in
# this Secret (mounted as env), never in the database, never in the Git
# repository.  See spec FR-008.
#
# This file is kept under .specify-tracked source control as a *template*
# so kustomize overlays can reference its metadata.name, but the
# `stringData.SHIFTWISE_FERNET_KEY` field is intentionally left blank —
# the operator MUST supply it. The Deployment for the backend / worker
# must declare:
#
#   envFrom:
#     - secretRef:
#         name: shiftwise-credential-key
---
apiVersion: v1
kind: Secret
metadata:
  name: shiftwise-credential-key
  labels:
    app.kubernetes.io/name: shiftwise
    app.kubernetes.io/component: credential-vault
    app.kubernetes.io/part-of: shiftwise
type: Opaque
stringData:
  # Populated by the operator at deploy time. MUST be a valid Fernet key.
  SHIFTWISE_FERNET_KEY: ""
  # Comma-separated list of previous Fernet keys, oldest last. Empty in
  # steady state.
  SHIFTWISE_FERNET_OLD_KEYS: ""
