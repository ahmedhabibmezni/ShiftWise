# SecurityContextConstraints custom — autorise les volumes `nfs` directs
# pour le populator du migrator UNIQUEMENT.
#
# Pourquoi un SCC custom ?
# Aucun SCC built-in OpenShift n'autorise volumes.nfs direct sauf
# `privileged`, qui est trop permissif (capabilities, host*, runAsUser=root).
# Ce SCC clone les contraintes de `restricted-v2` et n'ajoute QUE `nfs` à
# allowedVolumeTypes — toutes les autres restrictions sont conservées.
#
# Pourquoi besoin de NFS direct ?
# Le populator copie un QCOW2 du PVC de transit (namespace shiftwise) vers
# un PVC tenant (namespace shiftwise-{tenant_id}). Les PVC sont
# namespace-scoped — pas franchissables. Le NFS direct atteint la même
# donnée physique sans passer par un PVC cross-namespace.
#
# Lié au SA `default` du namespace tenant `shiftwise-system` pour le test
# initial. En production, le migrator devra auto-créer un SA dédié dans
# chaque namespace tenant et lier ce SCC dynamiquement.
---
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: shiftwise-populator
  annotations:
    kubernetes.io/description: >-
      Cloned from restricted-v2 with `nfs` volume type added.
      Used by the ShiftWise migrator populator pods only.
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowPrivilegeEscalation: true
# Le populator lui-même ne demande pas privileged (qemu-img convert tourne
# en restricted). C'est le pod adapter (libguestfs/virt-customize) qui en
# a besoin pour faire tourner son appliance qemu interne — sans privileged
# guestfs_launch échoue avec "appliance failed to start" parce que le
# seccomp + capabilities par défaut bloquent les syscalls que qemu utilise.
# Le SCC est lié au SA `default` du namespace tenant uniquement, donc le
# blast radius reste contenu à ce namespace.
allowPrivilegedContainer: true
allowedCapabilities: null
defaultAddCapabilities: null
fsGroup:
  type: MustRunAs
groups: []
priority: 10                # higher than restricted-v2 (default = null) to win selection
readOnlyRootFilesystem: false
requiredDropCapabilities:
  - ALL
runAsUser:
  type: MustRunAsRange
seLinuxContext:
  type: MustRunAs
seccompProfiles:
  - runtime/default
supplementalGroups:
  type: RunAsAny
allowedVolumeTypes:
  - configMap
  - csi
  - downwardAPI
  - emptyDir
  - ephemeral
  - nfs                     # <- LA seule différence vs restricted-v2
  - persistentVolumeClaim
  - projected
  - secret
users:
  # SA par défaut des namespaces tenants où tournent les populator pods.
  # En production, on liera dynamiquement à un SA dédié.
  - system:serviceaccount:shiftwise-system:default
