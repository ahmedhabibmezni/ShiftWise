# Redis broker for Celery (orchestration des migrations).
#
# Single-replica Deployment with a PVC backed by nfs-client. Persistence is
# enabled via appendonly + appendfsync everysec — durable enough that a Redis
# pod restart does not lose in-flight migration tasks. The authoritative state
# remains in PostgreSQL; Redis is just the work-queue buffer.
#
# Apply with:  oc apply -f redis-deployment.yaml -n shiftwise
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: shiftwise
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: nfs-client
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: shiftwise
data:
  redis.conf: |
    bind 0.0.0.0
    protected-mode no
    appendonly yes
    appendfsync everysec
    dir /data
    maxmemory 512mb
    maxmemory-policy noeviction
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: shiftwise
  labels: {app: redis, component: broker}
spec:
  replicas: 1
  strategy:
    type: Recreate            # PVC is RWO — never two pods at once.
  selector:
    matchLabels: {app: redis}
  template:
    metadata:
      labels: {app: redis, component: broker}
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          args: ["/etc/redis/redis.conf"]
          ports:
            - {name: redis, containerPort: 6379}
          volumeMounts:
            - {name: data,   mountPath: /data}
            - {name: config, mountPath: /etc/redis}
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits:   {cpu: 500m, memory: 768Mi}
          livenessProbe:
            tcpSocket: {port: 6379}
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command: [redis-cli, ping]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim: {claimName: redis-data}
        - name: config
          configMap: {name: redis-config}
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: shiftwise
spec:
  selector: {app: redis}
  ports:
    - {name: redis, port: 6379, targetPort: 6379}
  type: ClusterIP
