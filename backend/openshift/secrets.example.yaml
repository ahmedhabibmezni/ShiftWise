# secrets.example.yaml — TEMPLATE, ne contient AUCUN secret réel.
#
# Les manifests référencent un Secret `shiftwise-secrets` et un ConfigMap
# `shiftwise-config` qui ne sont (volontairement) PAS commités avec de vraies
# valeurs. Ce fichier documente toutes les clés attendues.
#
# Utilisation :
#   1. cp secrets.example.yaml secrets.local.yaml   (en dehors du suivi Git
#      de préférence, ou dans un coffre-fort de secrets).
#   2. Remplir secrets.local.yaml avec les vraies valeurs.
#      IMPORTANT : ce nouveau fichier N'EST PAS ignoré par défaut. Ajouter
#      explicitement son nom au .gitignore racine AVANT de le créer —
#      NE JAMAIS commiter un fichier contenant de vrais secrets.
#   3. oc apply -f secrets.local.yaml -n shiftwise   AVANT `./deploy.sh`.
#
# Mieux : en production, ne pas stocker ce fichier sur disque du tout —
# gérer le Secret via un coffre-fort (HashiCorp Vault, External Secrets
# Operator, Sealed Secrets) plutôt qu'un `oc apply` d'un fichier en clair.
#
# Génération d'une SECRET_KEY forte :
#   python -c "import secrets; print(secrets.token_urlsafe(48))"
# Génération d'un mot de passe Redis / DB :
#   python -c "import secrets; print(secrets.token_urlsafe(24))"
#
# `stringData` permet de saisir les valeurs en clair ; OpenShift les encode
# en base64 à l'apply. Ne pas utiliser `data:` avec des valeurs déjà encodées
# dans un fichier d'exemple — ça masque les placeholders.
---
apiVersion: v1
kind: Secret
metadata:
  name: shiftwise-secrets
  namespace: shiftwise
type: Opaque
stringData:
  # ----- Base de données PostgreSQL (clés OBLIGATOIRES, sans défaut) ----------
  # Consommées par app.core.config.Settings ET par le conteneur postgres
  # (POSTGRES_DB / POSTGRES_USER / POSTGRES_PASSWORD).
  DATABASE_NAME: shiftwise
  DATABASE_USER: shiftwise
  DATABASE_PASSWORD: CHANGE_ME_strong_db_password

  # ----- JWT (clé OBLIGATOIRE) -----------------------------------------------
  # Signe et vérifie tous les JWT (HS256). >= 32 caractères, aléatoire.
  # L'application refuse de démarrer sur une valeur faible/placeholder.
  SECRET_KEY: CHANGE_ME_run_python_secrets_token_urlsafe_48

  # ----- Redis (mot de passe — requis depuis le durcissement G20) ------------
  # Redis tourne avec --requirepass $(REDIS_PASSWORD) et protected-mode yes.
  # CONSEQUENCE : REDIS_AUTH_URL, CELERY_BROKER_URL et CELERY_RESULT_BACKEND
  # DOIVENT inclure ce mot de passe — format redis://:<password>@host:port/db.
  # Voir les valeurs *_URL plus bas, qui doivent être tenues cohérentes.
  REDIS_PASSWORD: CHANGE_ME_strong_redis_password

  # URLs Redis avec credentials inline. Le `:` initial est volontaire
  # (pas de username, juste un password). Garder le password identique à
  # REDIS_PASSWORD ci-dessus.
  #   DB 0 = broker / résultats Celery   DB 1 = refresh tokens + throttle login
  REDIS_AUTH_URL: redis://:CHANGE_ME_strong_redis_password@redis:6379/1
  CELERY_BROKER_URL: redis://:CHANGE_ME_strong_redis_password@redis:6379/0
  CELERY_RESULT_BACKEND: redis://:CHANGE_ME_strong_redis_password@redis:6379/0

  # ----- Flower basic-auth (G18) ---------------------------------------------
  # Flower n'est plus exposé via Route publique ; si vous le ré-exposez,
  # --basic-auth lit cette valeur. Format : user:password (ou plusieurs
  # séparés par des virgules : user1:pw1,user2:pw2).
  FLOWER_BASIC_AUTH: admin:CHANGE_ME_strong_flower_password

  # ----- Bootstrap superuser (OPTIONNEL) -------------------------------------
  # Lus par bootstrap.py (db-init Job). Si BOOTSTRAP_SUPERUSER_EMAIL est
  # absent, aucun superuser n'est créé. Si l'email est fourni, le PASSWORD
  # est obligatoire. USERNAME défaut=admin, TENANT défaut=system.
  # Décommenter pour créer un superuser au premier déploiement :
  # BOOTSTRAP_SUPERUSER_EMAIL: admin@example.com
  # BOOTSTRAP_SUPERUSER_USERNAME: admin
  # BOOTSTRAP_SUPERUSER_PASSWORD: CHANGE_ME_strong_admin_password
  # BOOTSTRAP_SUPERUSER_TENANT: system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: shiftwise-config
  namespace: shiftwise
data:
  # Valeurs NON sensibles. Les défauts de app.core.config.Settings
  # conviennent à la plupart des déploiements — surcharger ici au besoin.

  # ----- Application ---------------------------------------------------------
  DEBUG: "false"
  LOG_LEVEL: "INFO"

  # ----- CORS — origines autorisées (JSON list ou CSV) -----------------------
  # Doit lister l'URL publique du frontend ShiftWise.
  BACKEND_CORS_ORIGINS: '["https://shiftwise.apps.migration.nextstep-it.com"]'

  # ----- Kubernetes / OpenShift ----------------------------------------------
  # En cluster, le backend utilise le ServiceAccount du pod.
  KUBERNETES_MODE: "incluster"
  USE_IN_CLUSTER: "true"
  KUBERNETES_VERIFY_SSL: "false"

  # ----- Migrator / Converter ------------------------------------------------
  # Le migrator auto-découvre le NFS depuis le PV de transit-pvc ; ne définir
  # NFS_SERVER / NFS_PATH que pour un override d'urgence (les DEUX ensemble).
  # NFS_SERVER: "10.9.21.154"
  # NFS_PATH: "/nfs-storage/openshift-vms"
  CONVERTER_K8S_NAMESPACE: "shiftwise"

  # ----- Images des Jobs runtime (converter / populator / adapter) -----------
  # B-2 — le worker Celery spawn ces Jobs au runtime. Ils ont besoin de
  # qemu-img (converter/populator) et libguestfs (adapter), tous présents
  # UNIQUEMENT dans l'image worker (Dockerfile.worker) — pas dans l'image API
  # slim. Les défauts dans config.py pointent désormais sur l'image worker,
  # mais on les fige ici explicitement pour que le ref d'image suive le tag
  # réellement publié. Aligner sur le tag construit par la CI.
  CONVERTER_CONTAINER_IMAGE: "docker.io/dida1609/shiftwise-backend-worker:latest"
  MIGRATOR_POPULATOR_IMAGE: "docker.io/dida1609/shiftwise-backend-worker:latest"
  ADAPTER_IMAGE: "docker.io/dida1609/shiftwise-backend-worker:latest"

  # ----- Auth / sécurité runtime ---------------------------------------------
  # Cookie refresh envoyé uniquement sur HTTPS en production.
  REFRESH_COOKIE_SECURE: "true"
  # Vérification des clés d'hôte SSH — laisser false en production.
  SSH_AUTO_ADD_HOST_KEYS: "false"
---
# ----- Credential vault (Fernet) — Secret SÉPARÉ (B-1) ------------------------
# SHIFTWISE_FERNET_KEY est un champ Settings OBLIGATOIRE sans défaut : l'app
# (backend, worker ET le Job db-init) refuse de démarrer s'il est absent —
# `Settings()` lève une ValidationError à l'import. Les Deployments backend /
# celery-worker et le Job db-init référencent ce Secret via `envFrom`.
#
# Il vit dans son PROPRE Secret (et non dans shiftwise-secrets) pour isoler la
# clé du vault des autres secrets applicatifs et faciliter sa rotation (cf.
# services/credentials/vault.py).
#
# Génération de la clé primaire :
#   python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
#
# Rotation : déplacer l'ancienne clé primaire dans SHIFTWISE_FERNET_OLD_KEYS
# (CSV, plus ancienne en dernier), générer une nouvelle primaire, redémarrer
# backend + workers, ré-chiffrer les lignes, puis purger l'ancienne clé.
#
# NE JAMAIS commiter un fichier avec une vraie clé. En production, gérer via
# un coffre-fort (Vault / External Secrets / Sealed Secrets).
apiVersion: v1
kind: Secret
metadata:
  name: shiftwise-credential-key
  namespace: shiftwise
type: Opaque
stringData:
  # Clé Fernet primaire (chiffre les nouvelles écritures). OBLIGATOIRE.
  SHIFTWISE_FERNET_KEY: CHANGE_ME_run_python_fernet_generate_key
  # Anciennes clés (déchiffrement uniquement) — CSV, vide en régime établi.
  SHIFTWISE_FERNET_OLD_KEYS: ""
