# ShiftWise frontend — SPA-friendly nginx vhost (US5).
#
# History-mode routing: any non-asset path falls back to /index.html so
# react-router-dom can take over client-side. gzip is on for the common
# text-y MIME types; static assets carry far-future cache headers.

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip compression for transferable text formats.
    gzip on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/css
        text/javascript
        text/plain
        text/xml
        application/javascript
        application/json
        application/manifest+json
        application/xml
        image/svg+xml;

    # Far-future cache for hashed Vite assets; the filename hashes guarantee
    # that updates land instantly without stale-cache foot-guns.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every other path goes through the React router.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Avoid leaking nginx version in headers.
    server_tokens off;
}
