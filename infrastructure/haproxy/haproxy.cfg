#/etc/haproxy/haproxy.cfg
#---------------------------------------------------------------------
# HAProxy configuration for OpenShift 4.18
# Based on Red Hat official documentation
#---------------------------------------------------------------------

#---------------------------------------------------------------------
# Global settings
#---------------------------------------------------------------------
global
    log         127.0.0.1 local2
    chroot      /var/lib/haproxy
    pidfile     /var/run/haproxy.pid
    maxconn     4000
    user        haproxy
    group       haproxy
    daemon

    # turn on stats unix socket
    stats socket /var/lib/haproxy/stats

#---------------------------------------------------------------------
# Common defaults
#---------------------------------------------------------------------
defaults
    mode                    http
    log                     global
    option                  httplog
    option                  dontlognull
    option http-server-close
    option                  redispatch
    retries                 3
    timeout http-request    10s
    timeout queue           1m
    timeout connect         10s
    timeout client          1m
    timeout server          1m
    timeout http-keep-alive 10s
    timeout check           10s
    maxconn                 3000


#---------------------------------------------------------------------
# Stats interface
#---------------------------------------------------------------------
listen stats
    bind :9000
    mode http
    stats enable
    stats uri /
    stats realm HAProxy\ Statistics
    stats auth admin:admin
    stats refresh 30s

#---------------------------------------------------------------------
# Kubernetes API Server (6443)
# Red Hat requirement: Load balance across bootstrap + control plane
#---------------------------------------------------------------------
frontend api-server
    bind *:6443
    mode tcp
    option tcplog
    default_backend api-server-backend

backend api-server-backend
    mode tcp
    balance roundrobin
    option ssl-hello-chk
    # Bootstrap node (temporary - will be removed after installation)
    server bootstrap bootstrap.migration.nextstep-it.com:6443 check
    # Control Plane nodes (3-node compact)
    server node01 node01.migration.nextstep-it.com:6443 check
    server node02 node02.migration.nextstep-it.com:6443 check
    server node03 node03.migration.nextstep-it.com:6443 check

#---------------------------------------------------------------------
# Machine Config Server (22623)
# Red Hat requirement: Load balance across bootstrap + control plane
#---------------------------------------------------------------------
frontend machine-config-server
    bind *:22623
    mode tcp
    option tcplog
    default_backend machine-config-server-backend

backend machine-config-server-backend
    mode tcp
    balance roundrobin
    # Bootstrap node (temporary)
    server bootstrap bootstrap.migration.nextstep-it.com:22623 check
    # Control Plane nodes
    server node01 node01.migration.nextstep-it.com:22623 check
    server node02 node02.migration.nextstep-it.com:22623 check
    server node03 node03.migration.nextstep-it.com:22623 check

#---------------------------------------------------------------------
# Ingress HTTP (80)
# Red Hat requirement: Load balance across worker nodes
# In 3-node compact: Control Plane nodes ARE workers
#---------------------------------------------------------------------
frontend ingress-http
    bind *:80
    mode tcp
    option tcplog
    default_backend ingress-http-backend

backend ingress-http-backend
    mode tcp
    balance roundrobin
    # All nodes serve as workers in 3-node compact
    server node01 node01.migration.nextstep-it.com:80 check
    server node02 node02.migration.nextstep-it.com:80 check
    server node03 node03.migration.nextstep-it.com:80 check

#---------------------------------------------------------------------
# Ingress HTTPS (443)
# Red Hat requirement: Load balance across worker nodes
# In 3-node compact: Control Plane nodes ARE workers
#---------------------------------------------------------------------
frontend ingress-https
    bind *:443
    mode tcp
    option tcplog
    default_backend ingress-https-backend

backend ingress-https-backend
    mode tcp
    balance roundrobin
    option ssl-hello-chk
    # All nodes serve as workers in 3-node compact
    server node01 node01.migration.nextstep-it.com:443 check
    server node02 node02.migration.nextstep-it.com:443 check
    server node03 node03.migration.nextstep-it.com:443 check
