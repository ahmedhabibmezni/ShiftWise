#/etc/httpd/conf.d/openshift4.conf
#
# OpenShift 4 HTTP Server Configuration
# Based on Red Hat official documentation
#

# Configuration pour le répertoire OpenShift
<Directory "/var/www/html/openshift4">
    Options Indexes FollowSymLinks
    AllowOverride None
    Require all granted
</Directory>

# Alias pour faciliter l'accès
Alias /openshift4 /var/www/html/openshift4

# Configuration MIME types pour les fichiers Ignition
AddType application/json .ign

# Configuration pour permettre le téléchargement de gros fichiers
LimitRequestBody 0

# Logs spécifiques pour OpenShift
CustomLog logs/openshift4_access.log combined
ErrorLog logs/openshift4_error.log

# Don't forget to change Listen 80 to Listen 8080 in /etc/httpd/conf/httpd.conf