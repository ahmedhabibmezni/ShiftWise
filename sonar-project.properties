# SonarQube scanner configuration (Audit J4 — static analysis CI gate).
#
# Read by SonarSource/sonarqube-scan-action when the SONAR_TOKEN +
# SONAR_HOST_URL secrets are set on the repo. The scan job in
# .github/workflows/ci.yml is gated on those secrets, so a fork or a
# pre-config repo runs the rest of CI green; the scan activates as soon
# as the operator wires the secrets up.

sonar.projectKey=shiftwise
sonar.projectName=ShiftWise

# Source roots — the analyzer walks both stacks. Tests are declared so
# the engine separates coverage of test code from production code.
sonar.sources=backend/app,frontend/src
sonar.tests=backend/tests,frontend/src

# Restrict test analysis to the suffixed files so production code under
# the same root is not double-counted as tests.
sonar.test.inclusions=backend/tests/**/*.py,frontend/src/**/*.test.ts,frontend/src/**/*.test.tsx

# Python — backend.
sonar.python.version=3.11

# JavaScript / TypeScript — frontend.
sonar.javascript.environments=node,browser
sonar.typescript.tsconfigPath=frontend/tsconfig.json

# Exclude generated, vendored, and binary artefacts. Alembic migrations
# are intentionally low-friction and not worth flagging on.
sonar.exclusions=\
  **/node_modules/**,\
  **/__pycache__/**,\
  **/.pytest_cache/**,\
  **/dist/**,\
  **/build/**,\
  **/coverage/**,\
  frontend/dist/**,\
  backend/alembic/versions/**,\
  backend/app/ml/artifacts/**

# Encoding — source files are UTF-8 throughout.
sonar.sourceEncoding=UTF-8
